run:
  name: "harness_debug_cross_agent"
  default_run_id: "harness_debug_cross_agent"
  output_root: "paper/experiments"
  results_root: "paper/results"
  seed: 42

runtime:
  python_executable: null

resources:
  execution: "serial"
  max_cpu_threads: 1
  lightgbm_num_threads: 1
  low_memory_audit: true
  write_success_markers: true

datasets:
  sweverify_harness_core18:
    role: "robustness"
    prefix_table: "../data/harness_debug_cross_agent_20260625/prefix_tables/prefix_table_sweverify_harness_core18.parquet"
    split_enabled: true
    ablations_enabled: false
    answer_features_available: false
    model_col: "model_id"
    traj_col: "traj_id"
    instance_col: "instance_id"
    step_col: "prefix_step_idx"
    label_col: "label"

  terminalbench_harness_core16:
    role: "robustness"
    prefix_table: "../data/harness_debug_cross_agent_20260625/prefix_tables/prefix_table_terminalbench_harness_core16.parquet"
    split_enabled: true
    ablations_enabled: false
    answer_features_available: false
    model_col: "model_id"
    traj_col: "traj_id"
    instance_col: "instance_id"
    step_col: "prefix_step_idx"
    label_col: "label"

split:
  strategy: "leave_one_model_known_task"
  valid_ratio: 0.15
  train_valid_filter:
    allow_short_trajectory_filter: true
    min_steps: 2
    apply_to_test: false
