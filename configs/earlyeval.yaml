run:
  name: "earlyeval"
  default_run_id: "earlyeval_smoke"
  output_root: "paper/experiments"
  results_root: "paper/results"
  seed: 42

runtime:
  python_executable: null

resources:
  execution: "serial"
  max_cpu_threads: 8
  lightgbm_num_threads: 8
  low_memory_audit: true
  write_success_markers: true

datasets:
  sweverify:
    role: "main"
    prefix_table: "../data/prefix_predict_model_holdout_answer/model_holdout_answer_shared/prefix_table_filtered.parquet"
    verified_jsonl: "../data/swe_verify_500/offical_answer/test.jsonl"
    split_enabled: true
    ablations_enabled: true
    answer_features_available: true
    model_col: "model_id"
    traj_col: "traj_id"
    instance_col: "instance_id"
    step_col: "prefix_step_idx"
    label_col: "label"
    required_columns:
      - "traj_id"
      - "instance_id"
      - "model_id"
      - "label"
      - "prefix_step_idx"
      - "n_steps_total_for_weighting"
      - "task_prompt_text"
      - "prefix_action_text"
      - "prefix_feedback_text"
      - "last_action_text"
      - "last_feedback_text"
      - "prefix_thought_text"
      - "last_thought_text"
      - "gold_has_answer"

  toolathlon:
    role: "robustness"
    prefix_table: "../data/other_bench_prefix_tables/toolathlon/holdout15_p99_v1_audited_20260512/prefix_table_toolathlon.parquet"
    split_enabled: true
    ablations_enabled: false
    answer_features_available: false
    model_col: "model_id"
    traj_col: "traj_id"
    instance_col: "instance_id"
    step_col: "prefix_step_idx"
    label_col: "label"
    required_columns:
      - "traj_id"
      - "instance_id"
      - "model_id"
      - "label"
      - "prefix_step_idx"
      - "n_steps_total_for_weighting"
      - "task_prompt_text"
      - "prefix_action_text"
      - "prefix_feedback_text"
      - "last_action_text"
      - "last_feedback_text"
      - "prefix_thought_text"
      - "last_thought_text"

  terminalbench:
    role: "robustness"
    prefix_table: "../data/other_bench_prefix_tables/terminalbench/holdout15_p99_v3_audited_20260512/prefix_table_terminalbench.parquet"
    split_enabled: true
    ablations_enabled: false
    answer_features_available: false
    model_col: "model_id"
    traj_col: "traj_id"
    instance_col: "instance_id"
    step_col: "prefix_step_idx"
    label_col: "label"
    required_columns:
      - "traj_id"
      - "instance_id"
      - "model_id"
      - "label"
      - "prefix_step_idx"
      - "n_steps_total_for_weighting"
      - "task_prompt_text"
      - "prefix_action_text"
      - "prefix_feedback_text"
      - "last_action_text"
      - "last_feedback_text"
      - "prefix_thought_text"
      - "last_thought_text"

prefix_audit:
  no_full_text_load: true
  numeric_feature_checks:
    - "task_prompt_chars"
    - "prefix_action_chars"
    - "prefix_feedback_chars"
    - "prefix_thought_chars"
    - "prefix_assistant_content_chars"
    - "last_step_action_chars"
    - "last_step_feedback_chars"
    - "tool_calls_so_far"
    - "distinct_tools_so_far"
    - "actions_so_far"
    - "observations_so_far"
    - "gold_has_answer"
  action_columns:
    - "last_step_action_major_type"
    - "last_step_action_primary_subtype"

split:
  strategy: "leave_one_test_model_known_task"
  valid_ratio: 0.15
  valid_models_per_instance: 3
  min_valid_instances: 1
  min_trajectories_per_model: 100
  exclude_models: []
  excluded_model_reasons:
    "20260226_mini-v2.0.0_gemini-3-pro-high": "v2.0.0 mini-agent generation; incompatible with the v1.x scaffold suite this study is built on, excluded from the evaluation rotation"
    "20260219_mini-v2.0.0_gpt-5-2-codex": "v2.0.0 mini-agent generation (incompatible with the v1.x suite); also degenerate in the current prefix table (only step-0 trajectories)"
    "20260217_mini-v2.0.0_claude-4-6-opus": "v2.0.0 mini-agent generation (incompatible with the v1.x suite); also degenerate (only 8 usable trajectories)"
    "20250726_mini-v1.0.0_gemini-2.5-flash": "earliest v1.0.0 mini-agent generation with sparse, low-quality coverage"
    "20251124_mini-v1.16.0_claude-opus-4-5-20251101": "flagged in an earlier audit for extreme (highest-in-cohort) resolve-rate behaviour"
  train_valid_filter:
    allow_short_trajectory_filter: true
    min_steps: 2
    apply_to_test: false
  do_not_filter_longest_percent: true
  notes:
    - "Each fold holds out exactly one test_model."
    - "Inside the remaining models, train/valid are split by (instance_id, model_id) pairs (per_instance_model shadow-valid)."
    - "valid_models_per_instance = 3 (instance, model) pairs per instance go to valid; the rest stay in train. This intentionally keeps train and valid heavily overlapping at the instance level so calibration and threshold selection see a balanced instance distribution."
    - "Known-task evaluation also allows test_model instances to overlap with train/valid instances from other models."
    - "Held-out test prediction must keep step0, one-step, short, and long trajectories."

main_model:
  run_name: "model_holdout_answer_calibrated_full"
  predictor_family: "lightgbm"
  policy_mode: "dual"
  lgbm_preset: "strong_reg"
  mask_train_model_id: true
  score_mode: "calibrated"
  safe_label_min_step: 10
  # Feature engineering strategy:
  #   false (default) = use the shared, pre-fit FeatureEngineer pickle. Each
  #     fold loads the same dense scaler + label encoders + TF-IDF vocabulary
  #     + SVD basis. This is transductive feature engineering: the encoders
  #     have seen text from every model in the prefix table including the
  #     held-out test_model. We treat this as a fixed feature space shared
  #     across folds and disclose it as a limitation in the paper. Fast
  #     (~30-60 min per fold) and trivially parallel.
  #   true = fit a fresh FeatureEngineer on every fold's train split only.
  #     Strict no-leak, but adds ~90-150 min single-threaded fit work per
  #     fold and serializes that phase across parallel folds via the
  #     RAM-peak lock. Only flip this on if you want to verify the
  #     paper-headline numbers under strict per-fold fit; expect 16x more
  #     wall time on the main run.
  feature_engineer_fit_on_train: false
  variants:
    - "i"
  success_thresholds:
    - 0.95
  failure_thresholds:
    - 0.95
  policy_min_steps:
    - 0
  consecutive:
    - 1

policy_sweep:
  dataset: "sweverify"
  output_subdir: "valid_accuracy_075_095"
  prefix_models:
    - "I_LightGBM_Dense_AF"
  score_modes:
    - "calibrated"
  policy_modes:
    - "dual"
  dual_threshold_mode: "symmetric"
  candidate_probability_thresholds:
    start: 0.30
    stop: 0.99
    step: 0.01
  target_valid_decision_accuracy:
    start: 0.75
    stop: 0.95
    step: 0.01
  policy_min_steps:
    - 0
  consecutive:
    - 1
  max_valid_abs_drop_pp: null
  fallback_min_save_pct: 0.0
  write_decisions: true

ablation:
  dataset: "sweverify"
  scope: "main_model_only"
  feature_ablations:
    - "I_LightGBM_Dense_AF"
    - "J_LightGBM_Dense_AF_Thought"
    - "Abl_NoTaskSignal_LightGBM"
    - "Abl_NoTaskPromptTfidf_LightGBM"
    - "Abl_NoGoldAnswer_LightGBM"
    - "Abl_NoTaskSignal_NoGoldAnswer_LightGBM"
    - "Abl_NoFeedback_LightGBM"
    - "Abl_NoAction_LightGBM"
    - "Abl_NoThought_LightGBM"
    - "Abl_ProcessOnly_LightGBM"
  component_ablations:
    - "with_model_id_vs_no_model_id"
    - "default_vs_strong_reg"
    - "single_head_vs_dual_head"
    - "raw_vs_calibrated"
    - "threshold_min_step_k_sweep"

model_compare:
  dataset: "sweverify"
  methods:
    - "lr_dense"
    - "tfidf_lr"
    - "lightgbm_main"
    - "direct_mlp"
    - "qwen_lora"
    - "llm_logit_judge"
  heavy_methods_disabled_by_default:
    - "direct_mlp"
    - "qwen_lora"
    - "llm_logit_judge"
  excluded_current_scope:
    - "bert_codebert"

latency:
  dataset: "sweverify"
  compare_predictor_methods: true
  compare_agent_test_models: false
  batch_sizes:
    - 1
    - 8
    - 32
    - 128
    - 512
  metrics:
    - "feature_extraction_ms"
    - "predict_proba_ms"
    - "end_to_end_prefix_scoring_ms"
    - "prefixes_per_second"
    - "mean"
    - "median"
    - "p90"
    - "p95"
    - "p99"

smoke:
  run_id: "earlyeval_smoke"
  audit_datasets:
    - "sweverify"
    - "toolathlon"
    - "terminalbench"
  split_datasets:
    - "sweverify"
  max_folds_per_dataset: 2
