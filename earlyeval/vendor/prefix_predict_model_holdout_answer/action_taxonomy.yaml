# SWE-smith Trajectory Action Taxonomy
# description §6 description

major_types:
  - read
  - edit
  - execute
  - cleanup
  - submit

subtypes:
  read:
    - read_view        # str_replace_editor view
    - read_search      # grep / find / ls / cat / head / tail / sed -n / awk / wc

  edit:
    - edit_create      # str_replace_editor create
    - edit_replace     # str_replace_editor str_replace
    - edit_insert      # str_replace_editor insert
    - edit_undo        # str_replace_editor undo_edit

  execute:
    - test             # pytest / python -m pytest / tox / manage.py test / nosetests / python -m unittest / py.test
    - run_python       # python xxx.py / python -c / ipython (description test)
    - run_cli          # description bash description
    - git              # git status / git diff / git apply description

  cleanup:
    - cleanup          # rm / unlink

  submit:
    - submit           # submit description

classification_priority:
  description: >
    description bash description,description(description):
    1. test (description run_python,description python -m pytest description)
    2. run_python
    3. git
    4. cleanup
    5. read_search
    6. run_cli(description)

test_patterns:
  - "pytest"
  - "python -m pytest"
  - "python -m unittest"
  - "py.test"
  - "tox"
  - "manage.py test"
  - "nosetests"
  - "python *test*.py"
